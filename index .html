<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピックルボール予定表</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fc-event { cursor: pointer; }
    .fc { max-height: 70vh; }
    #tailwind-ui-preview-warning { display: none !important; }

    /* タブ切り替えアニメーション */
    .view-panel {
      transition: opacity 0.2s ease;
    }
    .view-panel.hidden {
      display: none;
    }

    /* 予定一覧カードのアニメーション */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .schedule-card {
      animation: slideUp 0.25s ease both;
    }
    .schedule-card:nth-child(1) { animation-delay: 0.03s; }
    .schedule-card:nth-child(2) { animation-delay: 0.07s; }
    .schedule-card:nth-child(3) { animation-delay: 0.11s; }
    .schedule-card:nth-child(4) { animation-delay: 0.15s; }
    .schedule-card:nth-child(5) { animation-delay: 0.19s; }

    /* 出欠バッジ */
    .badge-attend  { background:#d1fae5; color:#065f46; }
    .badge-absent  { background:#ffe4e6; color:#9f1239; }
    .badge-pending { background:#fef9c3; color:#854d0e; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-10">

  <!-- ヘッダー -->
  <header class="bg-sky-600 text-white shadow-md sticky top-0 z-10">
    <div class="p-4 flex justify-between items-center">
      <h1 class="text-lg font-bold flex items-center gap-2">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="10" cy="9" rx="7" ry="8" fill="white" opacity="0.9"/>
          <rect x="9" y="16" width="2.5" height="6" rx="1" fill="white" opacity="0.7"/>
          <circle cx="19" cy="5" r="3" fill="#fde047"/>
          <circle cx="18" cy="4.5" r="0.5" fill="#0284c7"/>
          <circle cx="20" cy="5.5" r="0.5" fill="#0284c7"/>
        </svg>
        P-Crew中野
      </h1>
      <span id="user-name" class="text-xs bg-sky-700 px-2 py-1 rounded-full">ゲストユーザー</span>
    </div>

    <!-- タブバー -->
    <div class="flex border-t border-sky-500">
      <button
        id="tab-calendar"
        onclick="switchTab('calendar')"
        class="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-semibold transition-colors
               bg-white text-sky-600 border-b-2 border-sky-600"
      >
        <!-- カレンダーアイコン -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        カレンダー
      </button>
      <button
        id="tab-list"
        onclick="switchTab('list')"
        class="flex-1 flex items-center justify-center gap-1.5 py-2.5 text-sm font-semibold transition-colors
               bg-sky-600 text-white/80 border-b-2 border-transparent"
      >
        <!-- リストアイコン -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/>
        </svg>
        予定一覧
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="max-w-md mx-auto p-4 space-y-4">

    <!-- ========== カレンダービュー ========== -->
    <div id="view-calendar" class="view-panel space-y-4">
      <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
        <div id="calendar"></div>
      </div>

      <!-- 詳細・出欠入力エリア -->
      <div id="detail-box" class="hidden bg-white p-5 rounded-xl shadow-md border border-sky-100 space-y-4 transition-all">
        <div class="border-b border-slate-100 pb-2">
          <h3 id="selected-date" class="text-xl font-bold text-sky-700">2026年06月15日</h3>
          <p id="selected-time-loc" class="text-sm text-slate-600 mt-1">🕒 --:-- 〜 --:-- / 📍 --</p>
        </div>

        <div id="admin-memo-box" class="hidden bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg text-sm">
          <strong>💰 管理者集金メモ:</strong> <span id="admin-memo-text">なし</span>
        </div>

        <div class="flex justify-end">
          <button
            onclick="addToGoogleCalendar()"
            class="flex items-center gap-1.5 bg-white border border-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-lg shadow-sm active:bg-slate-50"
          >
            <img src="https://www.gstatic.com/calendar/images/dynamiclogo_2020q4/calendar_31_2x.png" class="w-4 h-4" />
            Googleカレンダーに追加
          </button>
        </div>

        <div class="space-y-3">
          <h4 class="font-bold text-sm text-slate-700">あなたの出欠を登録</h4>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="submitAttendance('出席')" class="bg-emerald-500 text-white py-2 rounded-lg font-bold shadow-sm active:bg-emerald-600">出席</button>
            <button onclick="submitAttendance('欠席')" class="bg-rose-500 text-white py-2 rounded-lg font-bold shadow-sm active:bg-rose-600">欠席</button>
            <button onclick="submitAttendance('保留')" class="bg-amber-500 text-white py-2 rounded-lg font-bold shadow-sm active:bg-amber-600">保留</button>
          </div>
          <input type="text" id="user-comment" placeholder="コメント（遅刻します、など）" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:outline-sky-500">
        </div>

        <div class="border-t border-slate-100 pt-3 space-y-2">
          <h4 class="font-bold text-sm text-slate-700">👥 メンバー以外の代理入力</h4>
          <div class="flex gap-2">
            <input type="text" id="proxy-name" placeholder="ゲストの名前" class="flex-1 border border-slate-200 rounded-lg p-2 text-sm focus:outline-sky-500">
            <select id="proxy-status" class="border border-slate-200 rounded-lg p-2 text-sm bg-white">
              <option value="出席">出席</option>
              <option value="欠席">欠席</option>
            </select>
          </div>
          <button onclick="submitProxyAttendance()" class="w-full bg-slate-700 text-white py-2 rounded-lg text-sm font-semibold active:bg-slate-800">代理で出欠を追加する</button>
        </div>

        <div class="border-t border-slate-100 pt-3 space-y-2">
          <h4 class="font-bold text-sm text-slate-700">📊 出欠状況一覧</h4>
          <div id="attendance-list" class="text-sm space-y-1.5 max-h-40 overflow-y-auto">
            <p class="text-slate-400 text-xs text-center py-2">出欠登録はまだありません</p>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== 予定一覧ビュー ========== -->
    <div id="view-list" class="view-panel hidden space-y-3">

      <!-- 読み込み中 -->
      <div id="list-loading" class="text-center py-10 text-slate-400 text-sm">
        <svg class="animate-spin mx-auto mb-2 w-6 h-6 text-sky-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        予定を読み込み中…
      </div>

      <!-- カードリスト -->
      <div id="schedule-list-container" class="space-y-3 hidden"></div>

    </div>

  </main>

  <script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzANBsvAux2oFUL9X3pS3vetDwX7jK-ku2qZoliWca5veqgi95o0kcTN6_Tg12jvkpYdw/exec";

    let currentLiffUser = { id: "GUEST_LINE_ID", name: "テストユーザー" };
    let allSchedules = [];
    let selectedScheduleId = null;
    let calendar = null;
    let currentTab = 'calendar';

    // ========== タブ切り替え ==========
    function switchTab(tab) {
      currentTab = tab;

      const calPanel  = document.getElementById('view-calendar');
      const listPanel = document.getElementById('view-list');
      const tabCal    = document.getElementById('tab-calendar');
      const tabList   = document.getElementById('tab-list');

      if (tab === 'calendar') {
        calPanel.classList.remove('hidden');
        listPanel.classList.add('hidden');
        // アクティブスタイル
        tabCal.className  = tabCal.className.replace('bg-sky-600 text-white/80 border-transparent', 'bg-white text-sky-600 border-sky-600');
        tabList.className = tabList.className.replace('bg-white text-sky-600 border-sky-600', 'bg-sky-600 text-white/80 border-transparent');
      } else {
        calPanel.classList.add('hidden');
        listPanel.classList.remove('hidden');
        tabList.className = tabList.className.replace('bg-sky-600 text-white/80 border-transparent', 'bg-white text-sky-600 border-sky-600');
        tabCal.className  = tabCal.className.replace('bg-white text-sky-600 border-sky-600', 'bg-sky-600 text-white/80 border-transparent');
        renderScheduleList();
      }
    }

    // ========== 予定一覧の描画 ==========
    function renderScheduleList() {
      const container = document.getElementById('schedule-list-container');
      const loading   = document.getElementById('list-loading');

      if (allSchedules.length === 0) {
        loading.innerHTML = '<p class="text-slate-400 text-sm">予定がありません</p>';
        return;
      }

      loading.classList.add('hidden');
      container.classList.remove('hidden');
      container.innerHTML = '';

      // 日付順にソート（今日以降を先に、過去は後ろ）
      const today = new Date().toISOString().slice(0, 10);
      const sorted = [...allSchedules].sort((a, b) => a.date.localeCompare(b.date));

      sorted.forEach((sched, idx) => {
        const attendees = sched.attendance_list || [];
        const attending = attendees.filter(a => a.status === '出席');
        const absent    = attendees.filter(a => a.status === '欠席');
        const pending   = attendees.filter(a => a.status === '保留');
        const isPast    = sched.date < today;

        // 日付フォーマット
        const d = new Date(sched.date + 'T00:00:00');
        const weekDays = ['日','月','火','水','木','金','土'];
        const dateLabel = `${d.getMonth()+1}月${d.getDate()}日（${weekDays[d.getDay()]}）`;
        const isWeekend = d.getDay() === 0 || d.getDay() === 6;

        // 時刻（フィールド名の揺れに対応）
        const startTime = sched.start_time || sched.startTime || sched.start || '--:--';
        const endTime   = sched.end_time   || sched.endTime   || sched.time  || '--:--';

        const card = document.createElement('div');
        card.className = `schedule-card bg-white rounded-xl shadow-sm border ${isPast ? 'border-slate-100 opacity-60' : 'border-sky-100'} overflow-hidden`;
        card.style.animationDelay = `${idx * 0.04}s`;

        card.innerHTML = `
          <!-- カードヘッダー -->
          <div class="flex items-center justify-between px-4 py-3 ${isPast ? 'bg-slate-50' : 'bg-sky-50'} border-b ${isPast ? 'border-slate-100' : 'border-sky-100'}">
            <div class="flex items-center gap-2">
              <span class="text-base font-bold ${isPast ? 'text-slate-500' : isWeekend ? 'text-rose-600' : 'text-sky-700'}">${dateLabel}</span>
              ${isPast ? '<span class="text-[10px] bg-slate-200 text-slate-500 px-1.5 py-0.5 rounded">終了</span>' : ''}
            </div>
            <button
              onclick="openCalendarAndDetail('${sched.id}')"
              class="text-xs ${isPast ? 'text-slate-400 border-slate-200' : 'text-sky-600 border-sky-200'} border rounded-lg px-2 py-1 active:bg-sky-50"
            >出欠を登録 →</button>
          </div>

          <!-- カード本文 -->
          <div class="px-4 py-3 space-y-3">
            <!-- 時間・場所 -->
            <div class="flex flex-wrap gap-3 text-sm text-slate-600">
              <span class="flex items-center gap-1">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${startTime} 〜 ${endTime}
              </span>
              <span class="flex items-center gap-1">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${sched.location || '未設定'}
              </span>
            </div>

            ${sched.admin_memo ? `
            <div class="text-xs bg-amber-50 border border-amber-100 text-amber-700 px-2.5 py-1.5 rounded-lg">
              💰 ${sched.admin_memo}
            </div>` : ''}

            <!-- 出欠サマリー -->
            <div class="flex items-center gap-3">
              <span class="text-xs font-semibold badge-attend px-2 py-0.5 rounded-full">出席 ${attending.length}名</span>
              <span class="text-xs font-semibold badge-absent px-2 py-0.5 rounded-full">欠席 ${absent.length}名</span>
              ${pending.length > 0 ? `<span class="text-xs font-semibold badge-pending px-2 py-0.5 rounded-full">保留 ${pending.length}名</span>` : ''}
            </div>

            <!-- 出席者名一覧 -->
            ${attending.length > 0 ? `
            <div class="flex flex-wrap gap-1.5">
              ${attending.map(a => {
                const isOwn = a.line_user_id === currentLiffUser.id;
                return `<span class="text-xs ${isOwn ? 'bg-sky-100 text-sky-700 font-bold' : 'bg-slate-100 text-slate-600'} px-2 py-0.5 rounded-full">${a.user_name}</span>`;
              }).join('')}
            </div>` : ''}
          </div>
        `;

        container.appendChild(card);
      });
    }

    // 一覧から「出欠を登録」を押したときにカレンダータブへ移動して詳細を開く
    function openCalendarAndDetail(schedId) {
      switchTab('calendar');
      selectedScheduleId = schedId;
      showDetail(schedId);
      // 詳細ボックスへスクロール
      setTimeout(() => {
        document.getElementById('detail-box').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    // ========== 初期化 ==========
    window.onload = function() {
      initCalendar();
      liff.init({ liffId: "2010137832-Bsezw6iV" })
        .then(() => {
          if (!liff.isLoggedIn()) {
            liff.login();
          } else {
            liff.getProfile()
              .then(async profile => {
                currentLiffUser.id   = profile.userId;
                currentLiffUser.name = profile.displayName;
                document.getElementById('user-name').innerText = currentLiffUser.name;
                await fetchSchedules();
              })
              .catch(err => {
                console.error("プロフィール取得失敗:", err);
                fetchSchedules();
              });
          }
        })
        .catch(() => {
          console.log("LIFF初期化スキップ（テスト環境動作）");
          fetchSchedules();
        });
    };

    // ========== カレンダー初期化 ==========
    function initCalendar() {
      const calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'ja',
        headerToolbar: { left: 'prev', center: 'title', right: 'next' },
        height: 'auto',
        dateClick: function(info) {},
        eventClick: function(info) {
          showDetail(info.event.id);
        },
        eventContent: function(arg) {
          const count = arg.event.extendedProps.participantCount || 0;
          const time  = arg.event.extendedProps.startTime || "--:--";
          const paddleIcon = `
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" class="mr-0.5 inline-block">
              <path d="M5 8 C5 4, 19 4, 19 8 L19 14 C19 17, 5 17, 5 14 Z" />
              <rect x="11" y="16" width="2" height="7" rx="0.5" />
            </svg>`;
          return {
            html: `
              <div class="flex flex-col w-full text-center p-0.5 leading-tight overflow-hidden text-[10px]">
                <div class="flex items-center justify-center font-bold text-white">${paddleIcon}<span>${count}人</span></div>
                <div class="text-white/90 font-medium tracking-tighter">${time}</div>
              </div>`
          };
        }
      });
      calendar.render();
    }

    // ========== GASからデータ取得 ==========
    async function fetchSchedules() {
      try {
        const response = await fetch(`${GAS_API_URL}?action=getSchedules`);
        const json = await response.json();
        if (json.success) {
          allSchedules = json.data;
          calendar.removeAllEvents();
          allSchedules.forEach(sched => {
            const calTime = sched.start_time || "18:00";
            let count = 0;
            if (sched.attendance_list && Array.isArray(sched.attendance_list)) {
              count = sched.attendance_list.filter(att => att.status === "出席").length;
            }
            calendar.addEvent({
              id: sched.id,
              title: "",
              start: sched.date,
              allDay: true,
              backgroundColor: '#0284c7',
              borderColor: '#0284c7',
              extendedProps: { participantCount: count, startTime: calTime }
            });
          });
          if (selectedScheduleId) showDetail(selectedScheduleId);
          // 一覧表示中なら再描画
          if (currentTab === 'list') renderScheduleList();
        }
      } catch (e) {
        alert("データの取得に失敗しました: " + e);
      }
    }

    // ========== 詳細表示 ==========
    function showDetail(schedId) {
      selectedScheduleId = schedId;
      const sched = allSchedules.find(s => s.id == schedId);
      if (!sched) return;

      document.getElementById('detail-box').classList.remove('hidden');
      document.getElementById('selected-date').innerText = sched.date;
      const startTime = sched.start_time || sched.startTime || sched.start || "18:00";
      const endTime   = sched.end_time   || sched.endTime   || sched.time  || "20:00";
      document.getElementById('selected-time-loc').innerText = `🕒 ${startTime} 〜 ${endTime} \n📍 ${sched.location}`;

      if (sched.admin_memo) {
        document.getElementById('admin-memo-box').classList.remove('hidden');
        document.getElementById('admin-memo-text').innerText = sched.admin_memo;
      } else {
        document.getElementById('admin-memo-box').classList.add('hidden');
      }

      const listEl = document.getElementById('attendance-list');
      listEl.innerHTML = "";
      if (sched.attendance_list.length === 0) {
        listEl.innerHTML = `<p class="text-slate-400 text-xs text-center py-2">出欠登録はまだありません</p>`;
        return;
      }
      sched.attendance_list.forEach(att => {
        let badgeColor = "bg-slate-100 text-slate-700";
        if (att.status === "出席") badgeColor = "bg-emerald-100 text-emerald-800";
        if (att.status === "欠席") badgeColor = "bg-rose-100 text-rose-800";
        if (att.status === "保留") badgeColor = "bg-amber-100 text-amber-800";

        const proxyBadge = att.is_proxy ? `
          <span class="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded ml-1">代理</span>
          <button onclick="deleteProxyAttendance('${att.user_name}')" class="text-[10px] bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded ml-1 active:bg-rose-200">削除</button>
        ` : "";
        const commentText = att.comment ? `<p class="text-xs text-slate-500 pl-2">💬 ${att.comment}</p>` : "";
        const isOwn = att.line_user_id === currentLiffUser.id;
        const ownBg = isOwn ? "border-l-4 border-sky-500 bg-sky-50/50" : "";

        const item = document.createElement('div');
        item.className = `p-2 rounded-lg border border-slate-100 space-y-0.5 ${ownBg}`;
        item.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="font-medium">${att.user_name}${proxyBadge}</span>
            <span class="text-xs px-2 py-0.5 rounded-full font-bold ${badgeColor}">${att.status}</span>
          </div>
          ${commentText}
        `;
        listEl.appendChild(item);
      });
    }

    // ========== 出欠送信 ==========
    async function submitAttendance(status) {
      if (!selectedScheduleId) return;
      const comment = document.getElementById('user-comment').value;
      await sendData({
        action: "updateAttendance",
        data: {
          schedule_id: selectedScheduleId,
          line_user_id: currentLiffUser.id,
          user_name: currentLiffUser.name,
          status, comment, is_proxy: false
        }
      });
      document.getElementById('user-comment').value = "";
    }

    async function submitProxyAttendance() {
      if (!selectedScheduleId) return;
      const name   = document.getElementById('proxy-name').value.trim();
      const status = document.getElementById('proxy-status').value;
      if (!name) { alert("ゲストのお名前を入力してください"); return; }
      await sendData({
        action: "updateAttendance",
        data: {
          schedule_id: selectedScheduleId,
          line_user_id: currentLiffUser.id,
          user_name: name,
          status,
          comment: "代理入力",
          is_proxy: true
        }
      });
      document.getElementById('proxy-name').value = "";
    }

    async function sendData(payload) {
      try {
        const response = await fetch(GAS_API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payload)
        });
        const json = await response.json();
        if (json.success) {
          await fetchSchedules();
        } else {
          alert("保存エラー: " + json.error);
        }
      } catch (e) {
        alert("通信エラーが発生しました: " + e);
      }
    }

    async function deleteProxyAttendance(userName) {
      if (!confirm(`「${userName}」の出欠を削除しますか？`)) return;
      await sendData({
        action: "deleteAttendance",
        data: { schedule_id: selectedScheduleId, user_name: userName }
      });
    }

    // ========== Googleカレンダー追加 ==========
    function addToGoogleCalendar() {
      const sched = allSchedules.find(s => s.id == selectedScheduleId);
      if (!sched) return;
      const dateStr   = sched.date.replace(/-/g, "");
      const startTime = (sched.start_time || "18:00").replace(":", "");
      const endTime   = (sched.end_time   || "20:00").replace(":", "");
      const params = new URLSearchParams({
        action: "TEMPLATE",
        text: "🏓 ピックルボール練習",
        dates: `${dateStr}T${startTime}00/${dateStr}T${endTime}00`,
        location: sched.location || "",
        details: sched.admin_memo ? `管理者メモ: ${sched.admin_memo}` : "ピックルボールサークルの練習です",
      });
      const url = `https://calendar.google.com/calendar/render?${params.toString()}`;
      if (liff.isInClient()) {
        liff.openWindow({ url, external: true });
      } else {
        window.open(url, "_blank");
      }
    }
  </script>
</body>
</html>
